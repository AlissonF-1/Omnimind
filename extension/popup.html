<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; font-family: system-ui, -apple-system, sans-serif; padding: 16px; background: #1a1a1a; color: #fff; margin: 0; }
    h3 { margin-top: 0; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; font-size: 16px; }
    p.desc { font-size: 12px; color: #aaa; margin-bottom: 12px; margin-top: 4px; }
    label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
    select { width: 100%; padding: 6px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; outline: none; font-size: 12px; margin-bottom: 12px; }
    button { width: 100%; padding: 10px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #status { 
      margin-top: 16px; 
      font-size: 12px; 
      padding: 10px 12px; 
      border-radius: 8px; 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      font-weight: 500; 
      transition: all 0.2s; 
      border: 1px solid transparent;
      box-sizing: border-box;
      animation: slideIn 0.2s ease-out;
    }
    @keyframes slideIn {
      from { transform: translateY(4px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .success { 
      background: rgba(34, 197, 94, 0.08); 
      border: 1px solid rgba(34, 197, 94, 0.15); 
      border-left: 4px solid #22c55e; 
      color: #4ade80; 
    }
    .error { 
      background: rgba(239, 68, 68, 0.08); 
      border: 1px solid rgba(239, 68, 68, 0.15); 
      border-left: 4px solid #ef4444; 
      color: #f87171; 
    }
    .loading { 
      background: rgba(148, 163, 184, 0.08); 
      border: 1px solid rgba(148, 163, 184, 0.15); 
      border-left: 4px solid #94a3b8; 
      color: #cbd5e1; 
    }
  </style>
</head>
<body>
  <h3>📥 Clipper OmniMind</h3>
  <p class="desc">Salve a página atual como uma nova nota de estudo.</p>
  
  <label for="workspaceSelect">Salvar no workspace:</label>
  <select id="workspaceSelect">
    <option value="">Carregando workspaces...</option>
  </select>
  
  <button id="clipBtn">Salvar no OmniMind</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
